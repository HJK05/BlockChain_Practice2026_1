<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crypto Price Tracker</title>
</head>
<body>

<h1>Real-Time Cryptocurrency Prices</h1>

<table border="1">
    <tr>
        <th>Coin</th>
        <th>Price (USD)</th>
    </tr>
    <tr>
        <td>Bitcoin</td>
        <td id="btc">Loading...</td>
    </tr>
    <tr>
        <td>Ethereum</td>
        <td id="eth">Loading...</td>
    </tr>
</table>

<p>Next update in <span id="countdown">10</span> seconds</p>

<script>
let countdown = 10;

// 가격 가져오는 함수
async function fetchPrices() {
    try {
        const response = await fetch(
            "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd"
        );

        if (!response.ok) {
            throw new Error("Network response was not ok");
        }

        const data = await response.json();

        document.getElementById("btc").innerText = "$" + data.bitcoin.usd;
        document.getElementById("eth").innerText = "$" + data.ethereum.usd;

    } catch (error) {
        console.error("Error fetching prices:", error);
        document.getElementById("btc").innerText = "Error";
        document.getElementById("eth").innerText = "Error";
    }
}

// 초기 가격 불러오기
fetchPrices();

// 1초마다 카운트다운
setInterval(() => {
    countdown--;
    if (countdown <= 0) {
        fetchPrices(); // 가격 갱신
        countdown = 10; // 카운트다운 초기화
    }
    document.getElementById("countdown").innerText = countdown;
}, 1000);
</script>

</body>
</html>
